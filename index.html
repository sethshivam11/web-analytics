<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #222;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #555;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #4facfe;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #00c6ff;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome 👋</h1>
        <p>Your website is live and ready to go. Start building something amazing!</p>
        <button onclick="alert('Let’s get started!')">Get Started</button>
        <footer>© 2026 Your Website</footer>
    </div>
</body>
</html>
